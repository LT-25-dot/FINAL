<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九巴 / 龍運 實時到站查詢（完整修復版）</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ==================== 核心修正（從第一個版本保留） ==================== */
    * {
      box-sizing: border-box;
    }
    #map { 
      height: 600px; 
      position: relative; 
      width: 100%; 
    }
    .eta-card { max-height: 420px; overflow-y: auto; }
    .suggestions { max-height: 320px; }

    .minimal-red-dot {
      background: #e63939;
      border: 2px solid white;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      box-shadow: 0 0 0 3px rgba(230, 57, 57, 0.25);
    }

    /* 路線動畫（補回遺失的 keyframes） */
    .elegant-route {
      animation: dash-flow 2s linear infinite;
    }
    @keyframes dash-flow {
      to {
        stroke-dashoffset: -48;
      }
    }

    /* 抽屜選單 */
    .drawer {
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    /* 位置標記脈衝 */
    .user-marker-pulse {
      animation: pulse-ring 2s infinite ease-in-out;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { box-shadow: 0 0 0 16px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* ==================== 手機版微調（從第一個版本完整保留） ==================== */
    @media (max-width: 640px) {
      .search-container {
        padding: 12px !important;
      }
      #routeInput {
        padding-left: 12px !important;
        padding-right: 12px !important;
        font-size: 1rem !important;
      }
      .search-btn {
        padding-left: 20px !important;
        padding-right: 20px !important;
        white-space: nowrap;
      }
      .p-6 {
        padding: 16px !important;
      }
    }
  </style>
</head>
<body class="bg-gray-100">
  <!-- 頂部導航 + 漢堡包（第二個版本的現代化設計） -->
  <div class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-x-4">
        <button onclick="toggleDrawer()" class="w-11 h-11 flex items-center justify-center text-3xl text-gray-700 hover:text-red-600 transition-colors">
          ☰
        </button>
        <h1 class="text-2xl font-bold text-red-600">九巴 / 龍運</h1>
      </div>
      <div class="flex items-center gap-x-3">
        <button onclick="getUserLocation()" class="bg-white shadow hover:shadow-md border border-gray-300 text-red-600 px-5 py-2 rounded-3xl font-semibold flex items-center gap-2 text-sm transition">
          📍 我的位置
        </button>
        <button onclick="clearUserLocation()" id="clearBtn" class="hidden bg-white shadow hover:shadow-md border border-gray-300 text-gray-500 px-5 py-2 rounded-3xl font-semibold flex items-center gap-2 text-sm transition">
          清除
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto p-6">
    <p class="text-gray-500 mb-6 text-sm">輸入路線 → 點擊小紅點看 ETA → 綠色標記 + 藍色動態虛線已完全修復</p>

    <!-- 智慧搜尋（加上 search-container 讓 mobile 微調生效） -->
    <div class="bg-white rounded-3xl shadow p-6 mb-8 relative search-container">
      <div class="flex gap-4">
        <input id="routeInput" type="text" placeholder="輸入路線（如 235M、2、74B）" 
               class="flex-1 px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-red-500 text-lg font-medium"
               oninput="handleInput()">
        <button onclick="searchSelectedRoute()" class="search-btn bg-red-600 hover:bg-red-700 text-white px-10 py-4 rounded-3xl font-semibold transition">
          搜尋
        </button>
      </div>
      <div id="suggestions" class="hidden absolute left-0 right-0 bg-white border border-gray-200 rounded-3xl shadow-2xl mt-3 mx-4 z-50 suggestions overflow-auto"></div>
    </div>

    <!-- 方向選擇（第二個版本的華麗設計） -->
    <div id="directionPanel" class="hidden mb-8"></div>

    <!-- 地圖 -->
    <div id="mapContainer" class="hidden bg-white rounded-3xl shadow-lg overflow-hidden mb-8 relative border border-gray-100">
      <div id="map"></div>
    </div>

    <!-- ETA 面板（第二個版本的優化顯示） -->
    <div id="etaPanel" class="hidden bg-white rounded-3xl shadow-lg p-6">
      <h2 id="stopName" class="text-2xl font-bold mb-4"></h2>
      <div id="nextBus" class="mb-6 bg-red-50 border border-red-200 rounded-3xl p-5 text-center hidden"></div>
      <div id="etaList" class="eta-card space-y-3"></div>
    </div>
  </div>

  <!-- 抽屜選單（第二個版本的設計） -->
  <div onclick="if(event.target.id === 'drawerOverlay') toggleDrawer()" 
       id="drawerOverlay"
       class="hidden fixed inset-0 bg-black/60 z-[9999]"></div>
  
  <div id="drawer" class="drawer fixed top-0 left-0 bottom-0 w-72 bg-white shadow-2xl z-[10000] -translate-x-full flex flex-col">
    <div class="p-6 border-b flex items-center justify-between">
      <h2 class="text-xl font-bold text-red-600">九巴 / 龍運</h2>
      <button onclick="toggleDrawer()" class="text-3xl text-gray-400 hover:text-gray-600">✕</button>
    </div>
    <div class="flex-1 py-6 px-4 space-y-2 overflow-y-auto">
      <a href="index.html" onclick="toggleDrawer()" class="flex items-center gap-3 px-5 py-4 hover:bg-gray-100 rounded-2xl text-lg font-medium">🏠 首頁</a>
      <a onclick="toggleDrawer()" class="flex items-center gap-3 px-5 py-4 hover:bg-gray-100 rounded-2xl text-lg font-medium">📍 我的位置</a>
      <div class="h-px bg-gray-200 my-4 mx-5"></div>
      <a href="MTR.html" onclick="toggleDrawer()" class="flex items-center gap-3 px-5 py-4 hover:bg-gray-100 rounded-2xl text-lg font-medium">🚇 港鐵到站時間</a>
      <a href="#" onclick="toggleDrawer()" class="flex items-center gap-3 px-5 py-4 hover:bg-gray-100 rounded-2xl text-lg font-medium">🛤️ 路線規劃</a>
      <a href="#" onclick="toggleDrawer()" class="flex items-center gap-3 px-5 py-4 hover:bg-gray-100 rounded-2xl text-lg font-medium">⭐ 我的常用路線</a>
    </div>
    <div class="p-6 border-t text-xs text-gray-400 text-center">
      資料來源：運輸署 eBus API
    </div>
  </div>

  <script>
    let map, routePolyline, userLine, userMarker;
    let markers = [];
    let currentStops = [];
    let currentRoute = '', currentBound = '', currentServiceType = '1';
    let allRoutes = [];
    let userLat = null, userLng = null;
    const BASE = 'https://data.etabus.gov.hk';

    const minimalDotIcon = L.divIcon({
      className: 'minimal-red-dot',
      html: `<div class="minimal-red-dot"></div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    async function loadAllRoutes() {
      try {
        const res = await fetch(`${BASE}/v1/transport/kmb/route/`);
        const json = await res.json();
        allRoutes = json.data;
      } catch(e) { console.error(e); }
    }

    function handleInput() {
      const query = document.getElementById('routeInput').value.trim().toUpperCase();
      const sugDiv = document.getElementById('suggestions');
      if (!query || query.length < 1) { 
        sugDiv.classList.add('hidden'); 
        return; 
      }
      const filtered = allRoutes.filter(r => r.route.startsWith(query)).slice(0, 15);
      if (filtered.length === 0) { 
        sugDiv.classList.add('hidden'); 
        return; 
      }
      let html = `<div class="py-2">`;
      filtered.forEach(r => {
        const start = r.bound === 'O' ? r.orig_tc : r.dest_tc;
        const end = r.bound === 'O' ? r.dest_tc : r.orig_tc;
        const dirText = `由 ${start} 往 ${end}`;
        html += `<div onclick="selectSuggestion('${r.route}', '${r.bound}', '${r.service_type}')" class="px-5 py-3 hover:bg-gray-100 cursor-pointer flex justify-between items-center border-b last:border-none"><span class="font-bold text-xl text-red-600">${r.route}</span><span class="ml-4 text-gray-500">${dirText}</span></div>`;
      });
      html += `</div>`;
      sugDiv.innerHTML = html;
      sugDiv.classList.remove('hidden');
    }

    function selectSuggestion(route, bound, serviceType) {
      document.getElementById('routeInput').value = route;
      document.getElementById('suggestions').classList.add('hidden');
      currentRoute = route;
      searchRouteWithDirection(bound, serviceType);
    }

    async function searchSelectedRoute() {
      const input = document.getElementById('routeInput').value.trim().toUpperCase();
      if (!input) return;
      currentRoute = input;
      document.getElementById('suggestions').classList.add('hidden');
      await renderDirections();
    }

    async function renderDirections() {
      const panel = document.getElementById('directionPanel');
      panel.innerHTML = `<p class="text-center py-8">正在載入路線 ${currentRoute} 的方向…</p>`;
      panel.classList.remove('hidden');
      const filtered = allRoutes.filter(r => r.route === currentRoute);
      if (filtered.length === 0) return alert(`找不到路線 ${currentRoute}`);
      let html = `<h2 class="text-2xl font-semibold mb-6">路線 <span class="text-red-600">${currentRoute}</span> - 請選擇方向</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
      filtered.forEach(r => {
        const start = r.bound === 'O' ? r.orig_tc : r.dest_tc;
        const end = r.bound === 'O' ? r.dest_tc : r.orig_tc;
        const dirText = `由 ${start} 往 ${end}`;
        html += `<button onclick="searchRouteWithDirection('${r.bound}', '${r.service_type}')" class="p-8 border-2 border-gray-200 hover:border-red-500 rounded-3xl text-left transition-all hover:shadow-lg"><div class="flex items-center gap-4"><span class="text-4xl">${r.bound === 'O' ? '→' : '←'}</span><div><div class="text-2xl font-bold">${dirText}</div></div></div></button>`;
      });
      html += `</div>`;
      panel.innerHTML = html;
    }

    async function searchRouteWithDirection(bound, serviceType) {
      currentBound = bound;
      currentServiceType = serviceType;
      document.getElementById('directionPanel').classList.add('hidden');
      document.getElementById('mapContainer').classList.remove('hidden');
      document.getElementById('etaPanel').classList.add('hidden');

      initMap();

      markers.forEach(m => map.removeLayer(m));
      markers = [];
      currentStops = [];
      if (routePolyline) map.removeLayer(routePolyline);
      if (userLine) map.removeLayer(userLine);

      try {
        const res = await fetch(`${BASE}/v1/transport/kmb/route-stop/${currentRoute}/${currentBound === 'O' ? 'outbound' : 'inbound'}/${currentServiceType}`);
        const json = await res.json();
        const routeStops = json.data;

        const coords = [];
        let seq = 1;

        for (const item of routeStops) {
          const stopRes = await fetch(`${BASE}/v1/transport/kmb/stop/${item.stop}`);
          const stopJson = await stopRes.json();
          const stop = stopJson.data;
          if (!stop) continue;

          currentStops.push({ ...stop, seq: seq, stopId: item.stop });

          const marker = L.marker([stop.lat, stop.long], { icon: minimalDotIcon })
            .addTo(map)
            .bindTooltip(`<b>${seq}</b> ${stop.name_tc}`, { permanent: false, direction: 'top', offset: [0, -8] });

          marker.on('click', () => showETA(stop, item.seq));
          markers.push(marker);
          coords.push([parseFloat(stop.lat), parseFloat(stop.long)]);
          seq++;
        }

        if (coords.length > 1) {
          routePolyline = L.polyline(coords, {
            color: '#e63939',
            weight: 5,
            opacity: 0.85,
            dashArray: '12, 8',
            className: 'elegant-route'
          }).addTo(map);
        }

        if (markers.length > 0) map.fitBounds(coords, { padding: [50, 50] });

        if (userLat !== null && userLng !== null) {
          showUserLocation();
        }
      } catch(e) { console.error(e); }
    }

    function initMap() {
      if (map) return;
      map = L.map('map', { zoomControl: true }).setView([22.319, 114.169], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);
    }

    function showUserLocation() {
      if (!userLat || !userLng || !map) return;

      if (userMarker) map.removeLayer(userMarker);
      if (userLine) map.removeLayer(userLine);

      userMarker = L.circleMarker([userLat, userLng], {
        radius: 11,
        color: '#10b981',
        fillColor: '#10b981',
        fillOpacity: 0.95,
        weight: 4,
        className: 'user-marker-pulse'
      }).addTo(map).bindPopup('<b>📍 你的位置</b>').openPopup();

      autoConnectNearestStop();
    }

    function autoConnectNearestStop() {
      if (!currentStops.length || !userLat || !userLng || !map) return;

      let nearest = null, minDist = Infinity;
      currentStops.forEach(stop => {
        const dist = haversineDistance(userLat, userLng, parseFloat(stop.lat), parseFloat(stop.lng));
        if (dist < minDist) { minDist = dist; nearest = stop; }
      });

      if (!nearest) return;

      const coords = [[userLat, userLng], [parseFloat(nearest.lat), parseFloat(nearest.lng)]];
      userLine = L.polyline(coords, {
        color: '#3b82f6',
        weight: 4.5,
        opacity: 0.9,
        dashArray: '10, 15',
        lineJoin: 'round'
      }).addTo(map);

      let offset = 0;
      const animate = () => {
        if (!userLine) return;
        offset = (offset + 1) % 50;
        userLine.setStyle({ dashOffset: offset + 'px' });
        requestAnimationFrame(animate);
      };
      animate();

      map.flyTo([parseFloat(nearest.lat), parseFloat(nearest.lng)], 16, { duration: 1.5 });
    }

    async function getUserLocation() {
      if (!navigator.geolocation) return alert('瀏覽器不支援定位功能');
      navigator.geolocation.getCurrentPosition(pos => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        document.getElementById('clearBtn').classList.remove('hidden');
        initMap();
        showUserLocation();
      }, err => {
        let msg = '無法取得位置';
        if (err.code === 1) msg = '您已拒絕定位權限，請在瀏覽器設定中允許';
        alert(msg);
      }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function clearUserLocation() {
      userLat = userLng = null;
      if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
      if (userLine) { map.removeLayer(userLine); userLine = null; }
      document.getElementById('clearBtn').classList.add('hidden');
    }

    function toggleDrawer() {
      const drawer = document.getElementById('drawer');
      const overlay = document.getElementById('drawerOverlay');
      if (drawer.classList.contains('-translate-x-full')) {
        drawer.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
      } else {
        drawer.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
      }
    }

    async function showETA(stopInfo, seq) {
      document.getElementById('etaPanel').classList.remove('hidden');
      document.getElementById('stopName').innerHTML = `<span class="text-red-600">${stopInfo.name_tc}</span><span class="text-sm text-gray-500 ml-2">(${stopInfo.name_en})</span>`;

      const nextBusEl = document.getElementById('nextBus');
      const listEl = document.getElementById('etaList');
      listEl.innerHTML = `<p class="text-center py-8 text-gray-400">正在查詢實時到站…</p>`;

      try {
        const res = await fetch(`${BASE}/v1/transport/kmb/stop-eta/${stopInfo.stop}`);
        const json = await res.json();
        let etas = json.data.filter(e => e.route === currentRoute && (e.dir === currentBound || e.dir === (currentBound === 'O' ? 'I' : 'O')));

        if (etas.length === 0) {
          listEl.innerHTML = `<p class="text-center py-8 text-gray-400">目前暫無到站資料</p>`;
          nextBusEl.classList.add('hidden');
          return;
        }

        const now = new Date();
        const nextEta = etas[0];
        let minutesLeft = nextEta.eta ? Math.max(0, Math.round((new Date(nextEta.eta) - now) / 60000)) : '—';

        nextBusEl.innerHTML = `<div class="flex items-center justify-center gap-3"><span class="text-3xl">🚌</span><div><span class="text-xl font-medium text-red-600">下一班車還有</span><span class="text-5xl font-bold text-red-600 mx-2">${minutesLeft}</span><span class="text-xl font-medium text-red-600">分鐘</span></div></div>`;
        nextBusEl.classList.remove('hidden');

        let html = '';
        etas.forEach(eta => {
          const timeStr = eta.eta ? new Date(eta.eta).toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' }) : '預定班次';
          const min = eta.eta ? Math.max(0, Math.round((new Date(eta.eta) - now) / 60000)) : '—';
          html += `<div class="flex justify-between items-center border border-gray-200 rounded-3xl p-5"><div><div class="font-semibold text-lg">${eta.dest_tc}</div><div class="text-sm text-gray-500">${eta.rmk_tc || ''}</div></div><div class="text-right"><div class="text-3xl font-bold text-red-600">${timeStr}</div><div class="text-xs text-gray-400">${min} 分鐘</div></div></div>`;
        });
        listEl.innerHTML = html;
      } catch(e) {
        listEl.innerHTML = `<p class="text-red-500 text-center py-6">查詢失敗，請稍後再試</p>`;
        nextBusEl.classList.add('hidden');
      }
    }

    window.onload = () => {
      loadAllRoutes();
      console.log('✅ 九巴頁面已完全修復：佈局防溢出 + 位置虛線 + 抽屜 + 動畫全部正常！');
    };
  </script>
</body>
</html>
