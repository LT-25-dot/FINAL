<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九巴 / 龍運 實時到站查詢（已修復佈局溢出）</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 核心修正：防止所有元素因 padding 溢出 */
    * {
      box-sizing: border-box;
    }

    #map { height: 600px; position: relative; width: 100%; }
    .eta-card { max-height: 420px; overflow-y: auto; }
    .suggestions { max-height: 320px; }
    .minimal-red-dot {
      background: #e63939;
      border: 2px solid white;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      box-shadow: 0 0 0 3px rgba(230, 57, 57, 0.25);
    }
    .elegant-route { animation: dash-flow 2s linear infinite; }

    /* 抽屜選單 */
    .drawer {
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    /* 位置標記脈衝 */
    .user-marker-pulse {
      animation: pulse-ring 2s infinite ease-in-out;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { box-shadow: 0 0 0 16px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* 手機版微調 */
    @media (max-width: 640px) {
      .search-container {
        padding: 12px !important;
      }
      #routeInput {
        padding-left: 12px !important;
        padding-right: 12px !important;
        font-size: 1rem !important;
      }
      .search-btn {
        padding-left: 20px !important;
        padding-right: 20px !important;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body class="bg-gray-100">
  <!-- 頂部導航 -->
  <div class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-x-2">
        <button onclick="toggleDrawer()" class="w-10 h-10 flex items-center justify-center text-2xl text-gray-700 hover:text-red-600">
          ☰
        </button>
        <h1 class="text-xl font-bold text-red-600">九巴 / 龍運</h1>
      </div>
      <div class="flex items-center gap-x-2">
        <button onclick="getUserLocation()" class="bg-white shadow border border-gray-200 text-red-600 px-4 py-2 rounded-3xl font-semibold text-xs transition active:scale-95">
          📍 我的位置
        </button>
        <button onclick="clearUserLocation()" id="clearBtn" class="hidden bg-gray-100 text-gray-500 px-3 py-2 rounded-3xl text-xs">
          清除
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto p-4 md:p-6">
    <!-- 智慧搜尋框 - 修正溢出關鍵 -->
    <div class="bg-white rounded-3xl shadow p-4 mb-6 relative search-container">
      <div class="flex gap-2 items-stretch">
        <input id="routeInput" type="text" placeholder="輸入路線 (如 235M)" 
               class="flex-1 min-w-0 px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-red-500 text-base font-medium"
               oninput="handleInput()">
        <button onclick="searchSelectedRoute()" class="search-btn bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-2xl font-semibold transition active:scale-95">
          搜尋
        </button>
      </div>
      <div id="suggestions" class="hidden absolute left-0 right-0 bg-white border border-gray-200 rounded-2xl shadow-2xl mt-2 mx-4 z-50 suggestions overflow-auto"></div>
    </div>

    <!-- 方向選擇 -->
    <div id="directionPanel" class="hidden mb-6"></div>

    <!-- 地圖容器 -->
    <div id="mapContainer" class="hidden bg-white rounded-3xl shadow-lg overflow-hidden mb-6 relative border border-gray-100">
      <div id="map"></div>
    </div>

    <!-- ETA 面板 -->
    <div id="etaPanel" class="hidden bg-white rounded-3xl shadow-lg p-5">
      <h2 id="stopName" class="text-xl font-bold mb-4"></h2>
      <div id="nextBus" class="mb-5 bg-red-50 border border-red-100 rounded-2xl p-4 text-center hidden"></div>
      <div id="etaList" class="eta-card space-y-2"></div>
    </div>
  </div>

  <!-- 抽屜選單 -->
  <div onclick="if(event.target.id === 'drawerOverlay') toggleDrawer()" id="drawerOverlay" class="hidden fixed inset-0 bg-black/60 z-[9999]"></div>
  <div id="drawer" class="drawer fixed top-0 left-0 bottom-0 w-64 bg-white shadow-2xl z-[10000] -translate-x-full flex flex-col">
    <div class="p-5 border-b flex items-center justify-between">
      <h2 class="text-lg font-bold text-red-600">功能選單</h2>
      <button onclick="toggleDrawer()" class="text-2xl text-gray-400">✕</button>
    </div>
    <div class="flex-1 py-4 px-2 space-y-1 overflow-y-auto">
      <a href="index.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl font-medium text-gray-700">🏠 首頁</a>
      <a href="MTR.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl font-medium text-gray-700">🚇 港鐵到站查詢</a>
      <div class="h-px bg-gray-100 my-2 mx-4"></div>
      <p class="px-4 py-2 text-xs text-gray-400 uppercase">工具</p>
      <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl font-medium text-gray-700">⭐ 常用路線</a>
    </div>
    <div class="p-4 border-t text-[10px] text-gray-400 text-center">
      資料來源：運輸署 eBus API
    </div>
  </div>

  <script>
    // JS 部分保持原樣，因為邏輯是正確的
    let map, routePolyline, userLine, userMarker;
    let markers = [];
    let currentStops = [];
    let currentRoute = '', currentBound = '', currentServiceType = '1';
    let allRoutes = [];
    let userLat = null, userLng = null;
    const BASE = 'https://data.etabus.gov.hk';

    const minimalDotIcon = L.divIcon({
      className: 'minimal-red-dot',
      html: `<div class="minimal-red-dot"></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    async function loadAllRoutes() {
      try {
        const res = await fetch(`${BASE}/v1/transport/kmb/route/`);
        const json = await res.json();
        allRoutes = json.data;
      } catch(e) {}
    }

    function handleInput() {
      const query = document.getElementById('routeInput').value.trim().toUpperCase();
      const sugDiv = document.getElementById('suggestions');
      if (!query || query.length < 1) { sugDiv.classList.add('hidden'); return; }
      const filtered = allRoutes.filter(r => r.route.startsWith(query)).slice(0, 15);
      if (filtered.length === 0) { sugDiv.classList.add('hidden'); return; }
      let html = `<div class="py-1">`;
      filtered.forEach(r => {
        const start = r.bound === 'O' ? r.orig_tc : r.dest_tc;
        const end = r.bound === 'O' ? r.dest_tc : r.orig_tc;
        html += `<div onclick="selectSuggestion('${r.route}', '${r.bound}', '${r.service_type}')" class="px-4 py-3 hover:bg-gray-50 cursor-pointer flex justify-between items-center border-b border-gray-50 last:border-none"><span class="font-bold text-red-600">${r.route}</span><span class="text-xs text-gray-500">往 ${end}</span></div>`;
      });
      html += `</div>`;
      sugDiv.innerHTML = html;
      sugDiv.classList.remove('hidden');
    }

    function selectSuggestion(route, bound, serviceType) {
      document.getElementById('routeInput').value = route;
      document.getElementById('suggestions').classList.add('hidden');
      currentRoute = route;
      searchRouteWithDirection(bound, serviceType);
    }

    async function searchSelectedRoute() {
      const input = document.getElementById('routeInput').value.trim().toUpperCase();
      if (!input) return;
      currentRoute = input;
      document.getElementById('suggestions').classList.add('hidden');
      await renderDirections();
    }

    async function renderDirections() {
      const panel = document.getElementById('directionPanel');
      panel.innerHTML = `<p class="text-center py-4 text-sm text-gray-500">正在載入路線 ${currentRoute}...</p>`;
      panel.classList.remove('hidden');
      const filtered = allRoutes.filter(r => r.route === currentRoute);
      if (filtered.length === 0) return alert(`找不到路線 ${currentRoute}`);
      let html = `<h2 class="text-lg font-bold mb-4">選擇方向</h2><div class="grid grid-cols-1 gap-3">`;
      filtered.forEach(r => {
        const end = r.bound === 'O' ? r.dest_tc : r.orig_tc;
        html += `<button onclick="searchRouteWithDirection('${r.bound}', '${r.service_type}')" class="p-4 border border-gray-200 hover:border-red-500 rounded-2xl text-left bg-white transition-all active:bg-gray-50"><div class="text-base font-bold text-gray-800">往 ${end}</div><div class="text-xs text-gray-400">服務類型: ${r.service_type}</div></button>`;
      });
      html += `</div>`;
      panel.innerHTML = html;
    }

    async function searchRouteWithDirection(bound, serviceType) {
      currentBound = bound;
      currentServiceType = serviceType;
      document.getElementById('directionPanel').classList.add('hidden');
      document.getElementById('mapContainer').classList.remove('hidden');
      document.getElementById('etaPanel').classList.add('hidden');

      initMap();

      markers.forEach(m => map.removeLayer(m));
      markers = [];
      currentStops = [];
      if (routePolyline) map.removeLayer(routePolyline);
      if (userLine) map.removeLayer(userLine);

      try {
        const res = await fetch(`${BASE}/v1/transport/kmb/route-stop/${currentRoute}/${currentBound === 'O' ? 'outbound' : 'inbound'}/${currentServiceType}`);
        const json = await res.json();
        const routeStops = json.data;
        const coords = [];
        let seq = 1;

        for (const item of routeStops) {
          const stopRes = await fetch(`${BASE}/v1/transport/kmb/stop/${item.stop}`);
          const stopJson = await stopRes.json();
          const stop = stopJson.data;
          if (!stop) continue;

          currentStops.push({ ...stop, seq: seq, stopId: item.stop });
          const marker = L.marker([stop.lat, stop.long], { icon: minimalDotIcon })
            .addTo(map)
            .bindTooltip(`${seq}. ${stop.name_tc}`, { direction: 'top', offset: [0, -5] });

          marker.on('click', () => showETA(stop, item.seq));
          markers.push(marker);
          coords.push([parseFloat(stop.lat), parseFloat(stop.long)]);
          seq++;
        }

        if (coords.length > 1) {
          routePolyline = L.polyline(coords, { color: '#e63939', weight: 4, opacity: 0.8 }).addTo(map);
        }
        if (markers.length > 0) map.fitBounds(coords, { padding: [30, 30] });
        if (userLat !== null) showUserLocation();
      } catch(e) { console.error(e); }
    }

    function initMap() {
      if (map) {
          setTimeout(() => map.invalidateSize(), 100);
          return;
      }
      map = L.map('map', { zoomControl: false }).setView([22.319, 114.169], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
    }

    function showUserLocation() {
      if (!userLat || !userLng || !map) return;
      if (userMarker) map.removeLayer(userMarker);
      if (userLine) map.removeLayer(userLine);

      userMarker = L.circleMarker([userLat, userLng], {
        radius: 8, color: '#10b981', fillColor: '#10b981', fillOpacity: 0.9, weight: 3, className: 'user-marker-pulse'
      }).addTo(map);

      autoConnectNearestStop();
    }

    function autoConnectNearestStop() {
      if (!currentStops.length || !userLat) return;
      let nearest = null, minDist = Infinity;
      currentStops.forEach(stop => {
        const dist = haversineDistance(userLat, userLng, parseFloat(stop.lat), parseFloat(stop.lng));
        if (dist < minDist) { minDist = dist; nearest = stop; }
      });
      if (nearest) {
        userLine = L.polyline([[userLat, userLng], [parseFloat(nearest.lat), parseFloat(nearest.lng)]], {
          color: '#3b82f6', weight: 3, dashArray: '8, 12'
        }).addTo(map);
        map.flyTo([parseFloat(nearest.lat), parseFloat(nearest.lng)], 15);
      }
    }

    async function getUserLocation() {
      if (!navigator.geolocation) return alert('不支援定位');
      navigator.geolocation.getCurrentPosition(pos => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        document.getElementById('clearBtn').classList.remove('hidden');
        initMap();
        showUserLocation();
      }, null, { enableHighAccuracy: true });
    }

    function clearUserLocation() {
      userLat = userLng = null;
      if (userMarker) map.removeLayer(userMarker);
      if (userLine) map.removeLayer(userLine);
      document.getElementById('clearBtn').classList.add('hidden');
    }

    function toggleDrawer() {
      const drawer = document.getElementById('drawer');
      const overlay = document.getElementById('drawerOverlay');
      const isOpen = !drawer.classList.contains('-translate-x-full');
      if (isOpen) {
        drawer.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
      } else {
        drawer.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
      }
    }

    async function showETA(stopInfo, seq) {
      document.getElementById('etaPanel').classList.remove('hidden');
      document.getElementById('stopName').innerHTML = `<span class="text-red-600">${stopInfo.name_tc}</span>`;
      const listEl = document.getElementById('etaList');
      listEl.innerHTML = `<p class="text-center py-4 text-gray-400 text-sm">查詢中...</p>`;

      try {
        const res = await fetch(`${BASE}/v1/transport/kmb/stop-eta/${stopInfo.stop}`);
        const json = await res.json();
        let etas = json.data.filter(e => e.route === currentRoute);
        
        if (etas.length === 0) {
          listEl.innerHTML = `<p class="text-center py-4 text-gray-400 text-sm">暫無班次</p>`;
          return;
        }

        let html = '';
        etas.forEach(eta => {
          const now = new Date();
          const min = eta.eta ? Math.max(0, Math.round((new Date(eta.eta) - now) / 60000)) : '--';
          html += `<div class="flex justify-between items-center border border-gray-100 rounded-xl p-4 bg-gray-50">
            <div><div class="font-bold text-gray-700">${eta.dest_tc}</div><div class="text-[10px] text-gray-400">${eta.rmk_tc || ''}</div></div>
            <div class="text-right"><div class="text-xl font-black text-red-600">${min} <span class="text-xs">分</span></div></div>
          </div>`;
        });
        listEl.innerHTML = html;
      } catch(e) {
        listEl.innerHTML = `<p class="text-red-500 text-center py-4 text-sm">錯誤</p>`;
      }
    }

    window.onload = loadAllRoutes;
  </script>
</body>
</html>
