<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港公共交通到站時間查詢</title>
    <style>
        /* 整體佈局 */
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0;
            color: #2c3e50;
        }

        p {
            font-size: 1.2rem;
            color: #555;
            margin-top: 10px;
        }

        /* 按鈕容器 - 修正重疊問題 */
        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;                    /* 加大間距，避免重疊 */
            justify-content: center;
            max-width: 1300px;            /* 限制最大寬度 */
            width: 100%;
            padding: 0 20px;
            margin: 0 auto;
        }

        /* 共用按鈕樣式 + 背景圖片 + 半透明遮罩 */
        .btn {
            display: block;
            width: 280px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            min-height: 220px;
            flex-shrink: 0;               /* 防止按鈕被壓縮 */
        }

        /* 半透明深色遮罩 */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .btn:hover::after {
            background: rgba(0, 0, 0, 0.45);
        }

        .btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* 文字內容放在上方 */
        .btn > * {
            position: relative;
            z-index: 2;
        }

        .btn span {
            display: block;
            font-size: 1.1rem;
            margin-top: 12px;
            opacity: 0.95;
        }

        /* 四個按鈕的背景圖片 */
        .btn-mtr   { background-image: url('MTR.jpg'); }
        .btn-lr    { background-image: url('LR.jpg'); }
        .btn-bus   { background-image: url('BUS.jpg'); }
        .btn-games { background-image: url('GAME.jpg'); }

        /* 小遊戲按鈕額外霓虹效果 */
        .btn-games {
            box-shadow: 0 8px 20px rgba(0, 255, 200, 0.3);
        }
        .btn-games:hover {
            box-shadow: 0 12px 30px rgba(0, 255, 200, 0.5);
        }

        /* 手機適配 */
        @media (max-width: 768px) {
            .buttons {
                gap: 30px;
            }
            .btn {
                width: 85%;
                min-height: 200px;
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>香港公共交通到站查詢</h1>
        <p>選擇以下交通工具或小遊戲</p>
    </header>

    <div class="buttons">
        <a href="MTR.html" class="btn btn-mtr">
            港鐵 (MTR)
            <span>重鐵到站時間查詢</span>
        </a>

        <a href="LR.html" class="btn btn-lr">
            輕鐵 (Light Rail)
            <span>輕鐵到站時間查詢</span>
        </a>

        <a href="Bus.html" class="btn btn-bus">
            巴士 (Bus)
            <span>巴士到站時間查詢</span>
        </a>

        <a href="ALLGAMES.html" class="btn btn-games">
            🕹️ 小遊戲
            <span>超級貪食蛇 • 像素恐龍 • 霓虹2048</span>
        </a>
    </div>
</body>
</html>
