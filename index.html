<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港公共交通到站時間查詢</title>
    <style>
        /* 整體佈局 */
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            color: #333;
            padding-top: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 0 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            font-size: 2.6rem;
            margin: 0;
            color: #2c3e50;
        }

        p {
            font-size: 1.2rem;
            color: #555;
            margin-top: 10px;
        }

        /* 按鈕容器 - 完全對稱置中 */
        .buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
            padding: 0 20px;           /* 左右對稱間距 */
            margin: 0 auto;
        }

        /* 共用按鈕樣式 */
        .btn {
            display: block;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            min-height: 220px;
        }

        /* 半透明遮罩 */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.52);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .btn:hover::after {
            background: rgba(0, 0, 0, 0.42);
        }

        .btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .btn > * {
            position: relative;
            z-index: 2;
        }

        .btn span {
            display: block;
            font-size: 1.1rem;
            margin-top: 12px;
            opacity: 0.95;
        }

        /* 背景圖片 */
        .btn-mtr   { background-image: url('MTR.jpg'); }
        .btn-lr    { background-image: url('LR.jpg'); }
        .btn-bus   { background-image: url('BUS.jpg'); }
        .btn-games { background-image: url('GAME.jpg'); }

        /* 小遊戲按鈕特效 */
        .btn-games {
            box-shadow: 0 8px 20px rgba(0, 255, 200, 0.3);
        }
        .btn-games:hover {
            box-shadow: 0 12px 30px rgba(0, 255, 200, 0.5);
        }

        /* 手機完美適配 */
        @media (max-width: 768px) {
            .buttons {
                grid-template-columns: 1fr;
                gap: 25px;
                padding: 0 20px;
            }
            .btn {
                min-height: 190px;
                font-size: 1.65rem;
            }
            h1 {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 480px) {
            .btn {
                min-height: 180px;
                font-size: 1.55rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>香港公共交通到站查詢</h1>
        <p>選擇以下交通工具或小遊戲</p>
    </header>

    <div class="buttons">
        <a href="MTR.html" class="btn btn-mtr">
            港鐵 (MTR)
            <span>重鐵到站時間查詢</span>
        </a>

        <a href="LR.html" class="btn btn-lr">
            輕鐵 (Light Rail)
            <span>輕鐵到站時間查詢</span>
        </a>

        <a href="Bus.html" class="btn btn-bus">
            巴士 (Bus)
            <span>巴士到站時間查詢</span>
        </a>

        <a href="ALLGAMES.html" class="btn btn-games">
            🕹️ 小遊戲
            <span>超級貪食蛇 • 像素恐龍 • 霓虹2048</span>
        </a>
    </div>
</body>
</html>
