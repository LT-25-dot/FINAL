<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048方塊</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }

        html, body {
            overscroll-behavior: none;           /* 禁止 pull-to-refresh 同 overscroll */
            height: 100%;
        }

        body {
            background: linear-gradient(135deg, #0a001f, #1a0033);
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow-y: auto;
            position: relative;
            touch-action: none;                  /* 額外加強防止預設手勢 */
        }
        body::before {
            content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
            background: radial-gradient(circle at 50% 50%, rgba(255,136,0,0.15), transparent 70%);
            pointer-events: none; z-index: 0;
        }
        .container {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
            border-radius: 24px; border: 4px solid rgba(255,136,0,0.4);
            padding: 20px 15px 25px; box-shadow: 0 0 80px rgba(255,136,0,0.5);
            max-width: 100%; width: 95%; margin: 10px 0;
        }
        .top-title { text-align: center; margin-bottom: 15px; }
        .top-title h1 {
            font-size: 1.9rem;
            text-shadow: 0 0 20px #ff8800, 0 0 40px #ff8800, 0 0 60px #00ffcc;
            letter-spacing: 4px; color: #fff;
        }
        header { display:flex; align-items:center; margin-bottom:12px; padding:0 8px; }
        .scores { display:flex; gap:15px; margin-left:auto; }
        .score-box {
            background:rgba(0,0,0,0.4); padding:6px 14px; border-radius:12px;
            border:2px solid #ff8800; text-align:center; min-width:75px;
        }
        .label { font-size:0.65rem; opacity:0.8; }
        .value { font-size:1.35rem; color:#ff8800; }
        canvas {
            display:block; margin:0 auto 18px;
            background:#0a0a1f; border-radius:16px;
            border:6px solid #112233; box-shadow:0 0 40px rgba(255,136,0,0.4);
            image-rendering:pixelated;
            width: 100%;
            max-width: 100%;
            touch-action: none;           /* 最重要：禁止瀏覽器預設觸控行為 */
        }
        .controls { margin-top:15px; display:flex; justify-content:center; gap:12px; }
        button {
            font-family:'Press Start 2P'; font-size:1rem; cursor:pointer; border:none;
            border-radius:50px; padding:14px 24px; box-shadow:0 8px 0 #880055;
        }
        button:active { transform:translateY(4px); box-shadow:0 4px 0 #880055; }
        .main-btn { background:linear-gradient(#ff00aa,#cc0088); color:white; }
        /* 側邊選單 */
        .hamburger { background:none; border:none; width:50px; height:50px; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:5px; cursor:pointer; }
        .hamburger span { display:block; width:26px; height:3px; background:#ff8800; border-radius:3px; transition:all 0.3s; box-shadow:0 0 8px #ff8800; }
        .hamburger.active span:nth-child(1){transform:rotate(45deg) translate(6px,6px);}
        .hamburger.active span:nth-child(2){opacity:0;}
        .hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
        .sidebar {
            position:fixed; top:0; left:-290px; width:290px; height:100vh;
            background:rgba(10,0,35,0.98); backdrop-filter:blur(20px);
            border-right:4px solid rgba(255,136,0,0.5);
            box-shadow:10px 0 40px rgba(0,0,0,0.7);
            transition:left 0.45s cubic-bezier(0.32,0.72,0,1);
            z-index:3000; padding-top:90px;
        }
        .sidebar.open { left:0; }
        .sidebar ul { list-style:none; padding:0; margin:0; }
        .sidebar li { padding:18px 28px; border-bottom:1px solid rgba(255,136,0,0.2); transition:all 0.25s; }
        .sidebar li:hover { background:rgba(255,136,0,0.15); padding-left:40px; }
        .sidebar a { color:#88ccff; text-decoration:none; font-size:1.05rem; display:flex; align-items:center; gap:14px; letter-spacing:1px; }
        .sidebar a:hover { color:#ff8800; text-shadow:0 0 12px #ff8800; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.65); opacity:0; visibility:hidden; transition:all 0.4s; z-index:2999; }
        .overlay.show { opacity:1; visibility:visible; }
        .game-over {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            background:rgba(10,0,30,0.95); border:4px solid #ff0066;
            border-radius:20px; padding:30px 40px; text-align:center;
            display:none; z-index:10; box-shadow:0 0 50px #ff0066; width:85%;
        }
    </style>
</head>
<body>
    <div id="sidebar" class="sidebar">
        <ul>
            <li><a href="index.html">🏠 首頁</a></li>
            <li><a href="MTR.html">🚇 港鐵到站查詢</a></li>
            <li><a href="LR.html">🚋 輕鐵到站查詢</a></li>
            <li><a href="BUS.html">🚌 巴士到站查詢</a></li>
            <li><a href="ALLGAMES.html">🐍 小遊戲</a></li>
        </ul>
    </div>
    <div id="overlay" class="overlay"></div>
    <div class="container">
        <div class="top-title"><h1>2048方塊</h1></div>
        <header>
            <button id="hamburger" class="hamburger"><span></span><span></span><span></span></button>
            <div class="scores">
                <div class="score-box"><div class="label">分數</div><div class="value" id="score">0000</div></div>
                <div class="score-box"><div class="label">最高</div><div class="value" id="highscore">0000</div></div>
            </div>
        </header>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button onclick="newGame()" class="main-btn">🔄 新遊戲</button>
            <button onclick="togglePause()" class="main-btn">|| 暫停</button>
        </div>
        <p style="text-align:center; margin-top:15px; opacity:0.75; font-size:0.75rem;">
            滑動或按方向鍵移動<br>相同數字合併 → 2048！
        </p>
        <div id="gameOver" class="game-over">
            <h2 style="color:#ff0066; margin-bottom:10px; font-size:1.5rem;">GAME OVER</h2>
            <p style="margin-bottom:15px;">你的分數：<span id="finalScore" style="color:#ff8800; font-size:1.6rem;"></span></p>
            <button onclick="newGame()" style="width:100%; background:linear-gradient(#ff8800,#ff5500); color:#001122; font-size:1.1rem;">再玩一次！</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const SIZE = 4;
        let CELL = 90;
        let canvasWidth = 400;
        let board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
        let score = 0;
        let highScore = localStorage.getItem('2048High') || 0;
        let gameRunning = true;
        let paused = false;
        let animating = false;
        let animationStart = 0;
        let oldBoard = null;

        document.getElementById('highscore').textContent = String(highScore).padStart(4, '0');

        const colors = {
            2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
            32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
            512: '#9ed26b', 1024: '#64b5f6', 2048: '#ff00cc'
        };

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth * 0.92, 460);
            canvasWidth = Math.floor(maxWidth);
            CELL = Math.floor((canvasWidth - 40) / SIZE);
            canvas.width = canvasWidth;
            canvas.height = canvasWidth;
            drawStatic();
        }

        function addRandomTile() {
            let empties = [];
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (!board[i][j]) empties.push({x: i, y: j});
                }
            }
            if (!empties.length) return;
            let pos = empties[Math.floor(Math.random() * empties.length)];
            board[pos.x][pos.y] = Math.random() < 0.9 ? 2 : 4;
        }

        function copyBoard(b) { return b.map(row => [...row]); }

        function slide(row) {
            let r = row.filter(v => v);
            for (let i = 0; i < r.length - 1; i++) {
                if (r[i] === r[i + 1]) {
                    r[i] *= 2;
                    score += r[i];
                    r.splice(i + 1, 1);
                }
            }
            while (r.length < SIZE) r.push(0);
            return r;
        }

        function move(dir) {
            if (!gameRunning || paused || animating) return;
            oldBoard = copyBoard(board);
            let moved = false;

            if (dir === 'left') {
                for (let i = 0; i < SIZE; i++) {
                    let newRow = slide(board[i]);
                    if (newRow.join() !== board[i].join()) moved = true;
                    board[i] = newRow;
                }
            } else if (dir === 'right') {
                for (let i = 0; i < SIZE; i++) {
                    let rev = board[i].slice().reverse();
                    let newRow = slide(rev);
                    board[i] = newRow.reverse();
                    if (newRow.join() !== rev.join()) moved = true;
                }
            } else if (dir === 'up') {
                for (let j = 0; j < SIZE; j++) {
                    let col = board.map(r => r[j]);
                    let newCol = slide(col);
                    for (let i = 0; i < SIZE; i++) {
                        if (board[i][j] !== newCol[i]) moved = true;
                        board[i][j] = newCol[i];
                    }
                }
            } else if (dir === 'down') {
                for (let j = 0; j < SIZE; j++) {
                    let col = board.map(r => r[j]).reverse();
                    let newCol = slide(col);
                    for (let i = 0; i < SIZE; i++) {
                        if (board[i][j] !== newCol[SIZE - 1 - i]) moved = true;
                        board[i][j] = newCol[SIZE - 1 - i];
                    }
                }
            }

            if (moved) {
                animating = true;
                animationStart = Date.now();
                addRandomTile();
                document.getElementById('score').textContent = String(score).padStart(4, '0');
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('2048High', highScore);
                    document.getElementById('highscore').textContent = String(highScore).padStart(4, '0');
                }
                requestAnimationFrame(animateMove);
            }
        }

        function animateMove() {
            const progress = Math.min((Date.now() - animationStart) / 180, 1);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a0a1f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    let val = board[i][j];
                    let x = j * CELL + 20;
                    let y = i * CELL + 20;
                    let oldX = x, oldY = y;

                    if (oldBoard && oldBoard[i][j] && oldBoard[i][j] !== val) {
                        oldX = x + (Math.random() * 20 - 10);
                        oldY = y + (Math.random() * 20 - 10);
                    }

                    const interpX = oldX + (x - oldX) * progress;
                    const interpY = oldY + (y - oldY) * progress;

                    ctx.fillStyle = val ? (colors[val] || '#3c3a32') : '#1f1e2e';
                    ctx.fillRect(interpX, interpY, CELL - 10, CELL - 10);
                    ctx.shadowColor = val ? '#ff8800' : '#00ffcc';
                    ctx.shadowBlur = val ? 20 : 10;
                    ctx.strokeStyle = '#ff8800';
                    ctx.lineWidth = 6;
                    ctx.strokeRect(interpX, interpY, CELL - 10, CELL - 10);
                    ctx.shadowBlur = 0;

                    if (val) {
                        ctx.fillStyle = val >= 8 ? '#fff' : '#111';
                        ctx.font = `bold ${Math.floor(CELL * 0.45)}px Press Start 2P`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(val, interpX + (CELL - 10) / 2, interpY + (CELL - 10) / 2 + 4);
                    }
                }
            }

            if (progress < 1) {
                requestAnimationFrame(animateMove);
            } else {
                animating = false;
                oldBoard = null;
                drawStatic();
                checkGameOver();
            }
        }

        function drawStatic() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a0a1f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    let val = board[i][j];
                    let x = j * CELL + 20;
                    let y = i * CELL + 20;

                    ctx.fillStyle = val ? (colors[val] || '#3c3a32') : '#1f1e2e';
                    ctx.fillRect(x, y, CELL - 10, CELL - 10);
                    ctx.shadowColor = '#ff8800';
                    ctx.shadowBlur = 15;
                    ctx.strokeStyle = '#ff8800';
                    ctx.lineWidth = 6;
                    ctx.strokeRect(x, y, CELL - 10, CELL - 10);
                    ctx.shadowBlur = 0;

                    if (val) {
                        ctx.fillStyle = val >= 8 ? '#fff' : '#111';
                        ctx.font = `bold ${Math.floor(CELL * 0.45)}px Press Start 2P`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(val, x + (CELL - 10) / 2, y + (CELL - 10) / 2 + 4);
                    }
                }
            }
        }

        function checkGameOver() {
            let hasEmpty = false;
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (!board[i][j]) hasEmpty = true;
                }
            }
            if (hasEmpty) return;

            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE - 1; j++) {
                    if (board[i][j] === board[i][j + 1]) return;
                }
            }
            for (let j = 0; j < SIZE; j++) {
                for (let i = 0; i < SIZE - 1; i++) {
                    if (board[i][j] === board[i + 1][j]) return;
                }
            }

            gameRunning = false;
            document.getElementById('gameOver').style.display = 'block';
        }

        function newGame() {
            board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
            score = 0;
            document.getElementById('score').textContent = '0000';
            document.getElementById('gameOver').style.display = 'none';
            gameRunning = true;
            paused = false;
            addRandomTile();
            addRandomTile();
            drawStatic();
        }

        function togglePause() {
            if (gameRunning) paused = !paused;
        }

        // 鍵盤控制
        document.addEventListener('keydown', e => {
            if (!gameRunning || paused || animating) return;
            if (e.key === 'ArrowLeft') move('left');
            else if (e.key === 'ArrowRight') move('right');
            else if (e.key === 'ArrowUp') move('up');
            else if (e.key === 'ArrowDown') move('down');
        });

        // ==================== 觸控控制（已完全修復上下滑問題） ====================
        let tx = 0, ty = 0;

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            tx = e.changedTouches[0].screenX;
            ty = e.changedTouches[0].screenY;
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();        // 關鍵：阻止頁面滾動
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            if (!gameRunning || paused || animating) return;

            let dx = e.changedTouches[0].screenX - tx;
            let dy = e.changedTouches[0].screenY - ty;

            if (Math.abs(dx) > 50 || Math.abs(dy) > 50) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    move(dx > 0 ? 'right' : 'left');
                } else {
                    move(dy > 0 ? 'down' : 'up');
                }
            }
        }, { passive: false });

        // 側邊選單
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleSidebar() {
            const open = sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
            hamburger.classList.toggle('active');
        }

        hamburger.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        // 啟動遊戲
        window.onload = () => {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            newGame();
        };
    </script>
</body>
</html>
