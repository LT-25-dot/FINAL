<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>九巴 / 龍運 實時到站查詢（手機完全優化版）</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    #map { height: 520px; position: relative; width: 100%; }
    .eta-card { max-height: 380px; overflow-y: auto; }
    .suggestions { max-height: 280px; }

    .minimal-red-dot {
      background: #e63939;
      border: 2px solid white;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      box-shadow: 0 0 0 3px rgba(230, 57, 57, 0.25);
    }

    .elegant-route {
      animation: dash-flow 2s linear infinite;
    }
    @keyframes dash-flow {
      to { stroke-dashoffset: -48; }
    }

    .drawer {
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .user-marker-pulse {
      animation: pulse-ring 2s infinite ease-in-out;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { box-shadow: 0 0 0 16px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    .favorite-card {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .favorite-card:hover {
      transform: translateY(-2px);
      box-shadow: 10px 10px 20px -5px rgb(234 179 8 / 0.15);
    }

    /* ==================== 手機版全面優化 ==================== */
    @media (max-width: 640px) {
      .max-w-7xl { max-width: 100% !important; padding-left: 16px !important; padding-right: 16px !important; }
      #map { height: 460px !important; }
      
      .search-container { padding: 12px !important; }
      .search-container .flex { gap: 8px; }
      #routeInput {
        padding: 14px 16px !important;
        font-size: 1.05rem !important;
        border-radius: 9999px !important;
      }
      .search-btn {
        padding: 14px 24px !important;
        font-size: 1.05rem !important;
        border-radius: 9999px !important;
        white-space: nowrap;
      }
      .p-6 { padding: 16px !important; }
      .mb-8, .mb-6 { margin-bottom: 20px !important; }
    }
  </style>
</head>
<body class="bg-gray-100">
  <!-- 頂部導航 -->
  <div class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-x-4">
        <button onclick="toggleDrawer()" class="w-10 h-10 flex items-center justify-center text-3xl text-gray-700 hover:text-red-600 transition-colors">☰</button>
        <h1 class="text-2xl font-bold text-red-600">九巴 / 龍運</h1>
      </div>
      <button onclick="getUserLocation()" class="bg-white shadow hover:shadow-md border border-gray-300 text-red-600 px-5 py-2 rounded-3xl font-semibold flex items-center gap-2 text-sm transition">
        📍 我的位置
      </button>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    <p class="text-gray-500 mb-5 text-sm"></p>

    <!-- 我的最愛站 -->
    <div id="favoritesSection" class="mb-6">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-2xl font-semibold flex items-center gap-x-3">
          ⭐ 我的最愛站
          <span id="favoritesCount" class="text-sm font-normal text-gray-500 bg-yellow-100 text-yellow-700 px-3 py-1 rounded-3xl"></span>
        </h2>
        <button onclick="clearAllFavorites()" class="text-sm text-gray-400 hover:text-red-600 flex items-center gap-1 transition">🗑️ 清空</button>
      </div>
      <div id="favoritesList" class="grid grid-cols-1 gap-4"></div>
    </div>

    <!-- 智慧搜尋 -->
    <div class="bg-white rounded-3xl shadow p-4 sm:p-6 mb-8 relative search-container">
      <div class="flex gap-3">
        <input id="routeInput" type="text" placeholder="輸入路線（如 235M、2、74B）" 
               class="flex-1 px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-red-500 text-lg font-medium"
               oninput="handleInput()">
        <button onclick="searchSelectedRoute()" class="search-btn bg-red-600 hover:bg-red-700 text-white px-8 py-4 rounded-3xl font-semibold transition">
          搜尋
        </button>
      </div>
      <div id="suggestions" class="hidden absolute left-0 right-0 bg-white border border-gray-200 rounded-3xl shadow-2xl mt-3 mx-4 z-[99999] suggestions overflow-auto"></div>
    </div>

    <!-- 選擇方向面板 -->
    <div id="directionPanel" class="hidden mb-8"></div>

    <!-- 地圖 -->
    <div id="mapContainer" class="hidden bg-white rounded-3xl shadow-lg overflow-hidden mb-8 relative border border-gray-100">
      <div id="map"></div>
    </div>

    <!-- ETA 面板 -->
    <div id="etaPanel" class="hidden bg-white rounded-3xl shadow-lg p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 id="stopName" class="text-2xl font-bold"></h2>
        <button onclick="toggleFavoriteStop()" id="favoriteStopBtn" class="text-4xl transition-colors text-gray-300 hover:text-yellow-400">☆</button>
      </div>
      <div id="nextBus" class="mb-6 bg-red-50 border border-red-200 rounded-3xl p-5 text-center hidden"></div>
      <div id="etaList" class="eta-card space-y-3"></div>
    </div>
  </div>

  <!-- 抽屜選單 -->
  <div onclick="if(event.target.id === 'drawerOverlay') toggleDrawer()" id="drawerOverlay" class="hidden fixed inset-0 bg-black/60 z-[9999]"></div>
  <div id="drawer" class="drawer fixed top-0 left-0 bottom-0 w-72 bg-white shadow-2xl z-[10000] -translate-x-full flex flex-col">
    <div class="p-6 border-b flex items-center justify-between">
      <h2 class="text-xl font-bold text-red-600">九巴 / 龍運</h2>
      <button onclick="toggleDrawer()" class="text-3xl text-gray-400 hover:text-gray-600">✕</button>
    </div>
    <div class="flex-1 py-6 px-4 space-y-2 overflow-y-auto">
      <a href="index.html" onclick="toggleDrawer()" class="flex items-center gap-3 px-5 py-4 hover:bg-gray-100 rounded-2xl text-lg font-medium">🏠 首頁</a>
      <a onclick="toggleDrawer()" class="flex items-center gap-3 px-5 py-4 hover:bg-gray-100 rounded-2xl text-lg font-medium">📍 我的位置</a>
      <div class="h-px bg-gray-200 my-4 mx-5"></div>
      <a href="MTR.html" onclick="toggleDrawer()" class="flex items-center gap-3 px-5 py-4 hover:bg-gray-100 rounded-2xl text-lg font-medium">🚇 港鐵到站時間</a>
      <a onclick="toggleDrawer(); document.getElementById('favoritesSection').scrollIntoView({behavior:'smooth'})" class="flex items-center gap-3 px-5 py-4 hover:bg-gray-100 rounded-2xl text-lg font-medium">⭐ 我的最愛站</a>
    </div>
    <div class="p-6 border-t text-xs text-gray-400 text-center">資料來源：運輸署 eBus API</div>
  </div>

  <script>
    let map, routePolyline, userLine, userMarker;
    let markers = [];
    let currentStops = [];
    let currentRoute = '', currentBound = '', currentServiceType = '1';
    let currentStopId = null;
    let allRoutes = [];
    let savedFavorites = [];
    let userLat = null, userLng = null;
    let routesLoaded = false;
    const BASE = 'https://data.etabus.gov.hk';

    const minimalDotIcon = L.divIcon({
      className: 'minimal-red-dot',
      html: `<div class="minimal-red-dot"></div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function loadSavedFavorites() {
      const saved = localStorage.getItem('kmb_saved_favorites');
      savedFavorites = saved ? JSON.parse(saved) : [];
    }

    function saveFavoriteStop(route, bound, serviceType, stopId, stopName_tc, stopName_en, orig_tc, dest_tc) {
      const exists = savedFavorites.some(f => f.route === route && f.bound === bound && f.stopId === stopId);
      if (exists) return false;
      savedFavorites.unshift({ route, bound, service_type: serviceType, stopId, stopName_tc, stopName_en, orig_tc, dest_tc });
      if (savedFavorites.length > 15) savedFavorites.pop();
      localStorage.setItem('kmb_saved_favorites', JSON.stringify(savedFavorites));
      renderFavorites();
      return true;
    }

    function removeFavoriteStop(route, bound, stopId) {
      savedFavorites = savedFavorites.filter(f => !(f.route === route && f.bound === bound && f.stopId === stopId));
      localStorage.setItem('kmb_saved_favorites', JSON.stringify(savedFavorites));
      renderFavorites();
    }

    function clearAllFavorites() {
      if (confirm('確定要清空所有最愛站？')) {
        savedFavorites = [];
        localStorage.removeItem('kmb_saved_favorites');
        renderFavorites();
      }
    }

    async function getStopNextBus(route, bound, stopId) {
      try {
        const etaRes = await fetch(`${BASE}/v1/transport/kmb/stop-eta/${stopId}`);
        const etaJson = await etaRes.json();
        const relevant = etaJson.data.filter(e => e.route === route && e.dir === bound);
        if (relevant.length === 0) return null;
        const now = new Date();
        const nextEta = relevant[0].eta;
        if (!nextEta) return null;
        return Math.max(0, Math.round((new Date(nextEta) - now) / 60000));
      } catch(e) { return null; }
    }

    async function renderFavorites() {
      const container = document.getElementById('favoritesList');
      const countEl = document.getElementById('favoritesCount');
      
      if (savedFavorites.length === 0) {
        container.innerHTML = `
          <div class="empty-favorite bg-white border border-dashed border-gray-300 rounded-3xl p-8 text-center text-gray-400">
            <div class="text-5xl mb-3">⭐</div>
            <p class="text-lg">你仲未有最愛站</p>
            <p class="text-sm mt-1">點擊地圖小紅點 → ETA 面板右上角 ⭐ 即可儲存</p>
          </div>`;
        countEl.textContent = '0';
        document.getElementById('favoritesSection').classList.remove('hidden');
        return;
      }

      document.getElementById('favoritesSection').classList.remove('hidden');
      countEl.textContent = `${savedFavorites.length} 個`;

      let html = '';
      for (const f of savedFavorites) {
        const minutes = await getStopNextBus(f.route, f.bound, f.stopId);
        const dirText = `由 ${f.orig_tc} 往 ${f.dest_tc}`;
        const minText = minutes !== null 
          ? `<span class="text-3xl font-bold text-red-600">${minutes}</span><span class="text-sm text-red-600 ml-1">分鐘</span>` 
          : `<span class="text-gray-400">—</span>`;

        html += `
          <div onclick="loadFavoriteStop('${f.route}', '${f.bound}', '${f.service_type}', '${f.stopId}')" 
               class="favorite-card bg-white border border-gray-200 hover:border-yellow-400 rounded-3xl p-5 cursor-pointer flex flex-col">
            <div class="flex justify-between items-start">
              <div>
                <div class="flex items-baseline gap-3">
                  <span class="text-4xl font-bold text-red-600">${f.route}</span>
                  <span class="text-xl text-gray-400">${f.bound === 'O' ? '→' : '←'}</span>
                </div>
                <div class="text-sm text-gray-600 mt-1">${dirText}</div>
                <div class="text-base font-medium text-gray-800 mt-2">${f.stopName_tc}</div>
              </div>
              <button onclick="event.stopImmediatePropagation(); removeFavoriteStop('${f.route}', '${f.bound}', '${f.stopId}');" class="text-2xl text-gray-300 hover:text-red-500">🗑️</button>
            </div>
            <div class="mt-auto pt-4 flex justify-between items-end border-t border-gray-100">
              <div class="text-xs text-gray-400">下一班車</div>
              <div class="text-right">${minText}</div>
            </div>
          </div>`;
      }
      container.innerHTML = html;
    }

    function loadFavoriteStop(route, bound, serviceType, stopId) {
      currentRoute = route;
      currentBound = bound;
      currentServiceType = serviceType;
      searchRouteWithDirection(bound, serviceType).then(() => {
        setTimeout(() => {
          const stop = currentStops.find(s => s.stopId === stopId);
          if (stop) showETA(stop, stop.seq);
        }, 800);
      });
    }

    async function loadAllRoutes() {
      try {
        const res = await fetch(`${BASE}/v1/transport/kmb/route/`);
        const json = await res.json();
        allRoutes = json.data;
        routesLoaded = true;
      } catch(e) { console.error(e); }
    }

    function handleInput() {
      const query = document.getElementById('routeInput').value.trim().toUpperCase();
      const sugDiv = document.getElementById('suggestions');
      if (!query || query.length < 1 || !routesLoaded) { 
        sugDiv.classList.add('hidden'); 
        return; 
      }
      const filtered = allRoutes.filter(r => r.route.startsWith(query)).slice(0, 15);
      if (filtered.length === 0) { 
        sugDiv.classList.add('hidden'); 
        return; 
      }
      let html = `<div class="py-2">`;
      filtered.forEach(r => {
        const dirText = `由 ${r.orig_tc} 往 ${r.dest_tc}`;
        html += `<div onclick="selectSuggestion('${r.route}', '${r.bound}', '${r.service_type}')" class="px-5 py-3 hover:bg-gray-100 cursor-pointer flex justify-between items-center border-b last:border-none"><span class="font-bold text-xl text-red-600">${r.route}</span><span class="ml-4 text-gray-500">${dirText}</span></div>`;
      });
      html += `</div>`;
      sugDiv.innerHTML = html;
      sugDiv.classList.remove('hidden');
    }

    function selectSuggestion(route, bound, serviceType) {
      document.getElementById('routeInput').value = route;
      document.getElementById('suggestions').classList.add('hidden');
      currentRoute = route;
      searchRouteWithDirection(bound, serviceType);
    }

    async function searchSelectedRoute() {
      if (!routesLoaded) return alert('路線資料載入中，請稍候…');
      const input = document.getElementById('routeInput').value.trim().toUpperCase();
      if (!input) return;
      currentRoute = input;
      document.getElementById('suggestions').classList.add('hidden');
      await renderDirections();
    }

    async function renderDirections() {
      const panel = document.getElementById('directionPanel');
      panel.innerHTML = `<p class="text-center py-8">正在載入路線 ${currentRoute} 的方向…</p>`;
      panel.classList.remove('hidden');

      const filtered = allRoutes.filter(r => r.route === currentRoute);
      if (filtered.length === 0) {
        panel.innerHTML = `<p class="text-center py-8 text-red-500">找不到路線 ${currentRoute}</p>`;
        return;
      }

      let html = `<h2 class="text-2xl font-semibold mb-6">路線 <span class="text-red-600">${currentRoute}</span> - 請選擇方向</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
      filtered.forEach(r => {
        const dirText = `由 ${r.orig_tc} 往 ${r.dest_tc}`;
        html += `
          <div onclick="searchRouteWithDirection('${r.bound}', '${r.service_type}')" 
               class="cursor-pointer border-2 border-gray-200 hover:border-red-500 rounded-3xl p-8 text-left transition-all hover:shadow-lg">
            <div class="flex items-center gap-4">
              <span class="text-4xl">${r.bound === 'O' ? '→' : '←'}</span>
              <div class="text-2xl font-bold">${dirText}</div>
            </div>
          </div>`;
      });
      html += `</div>`;
      panel.innerHTML = html;
    }

    async function searchRouteWithDirection(bound, serviceType) {
      currentBound = bound;
      currentServiceType = serviceType;
      document.getElementById('directionPanel').classList.add('hidden');
      document.getElementById('mapContainer').classList.remove('hidden');
      document.getElementById('etaPanel').classList.add('hidden');

      initMap();

      markers.forEach(m => map.removeLayer(m));
      markers = [];
      currentStops = [];
      if (routePolyline) map.removeLayer(routePolyline);
      if (userLine) map.removeLayer(userLine);

      try {
        const res = await fetch(`${BASE}/v1/transport/kmb/route-stop/${currentRoute}/${currentBound === 'O' ? 'outbound' : 'inbound'}/${currentServiceType}`);
        const json = await res.json();
        const routeStops = json.data;

        const coords = [];
        let seq = 1;

        for (const item of routeStops) {
          const stopRes = await fetch(`${BASE}/v1/transport/kmb/stop/${item.stop}`);
          const stopJson = await stopRes.json();
          const stop = stopJson.data;
          if (!stop) continue;

          currentStops.push({ ...stop, seq: seq, stopId: item.stop });

          const marker = L.marker([stop.lat, stop.long], { icon: minimalDotIcon })
            .addTo(map)
            .bindTooltip(`<b>${seq}</b> ${stop.name_tc}`, { permanent: false, direction: 'top', offset: [0, -8] });

          marker.on('click', () => showETA(stop, item.seq));
          markers.push(marker);
          coords.push([parseFloat(stop.lat), parseFloat(stop.long)]);
          seq++;
        }

        if (coords.length > 1) {
          routePolyline = L.polyline(coords, {
            color: '#e63939',
            weight: 5,
            opacity: 0.85,
            dashArray: '12, 8',
            className: 'elegant-route'
          }).addTo(map);
        }

        if (markers.length > 0) map.fitBounds(coords, { padding: [50, 50] });

        if (userLat !== null && userLng !== null) showUserLocation();
      } catch(e) { console.error(e); }
    }

    function initMap() {
      if (map) return;
      map = L.map('map', { zoomControl: true }).setView([22.319, 114.169], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);
    }

    function showUserLocation() {
      if (!userLat || !userLng || !map) return;
      if (userMarker) map.removeLayer(userMarker);
      if (userLine) map.removeLayer(userLine);

      userMarker = L.circleMarker([userLat, userLng], {
        radius: 11,
        color: '#10b981',
        fillColor: '#10b981',
        fillOpacity: 0.95,
        weight: 4,
        className: 'user-marker-pulse'
      }).addTo(map).bindPopup('<b>📍 你的位置</b>').openPopup();

      autoConnectNearestStop();
    }

    function autoConnectNearestStop() {
      if (!currentStops.length || !userLat || !userLng || !map) return;
      let nearest = null, minDist = Infinity;
      currentStops.forEach(stop => {
        const dist = haversineDistance(userLat, userLng, parseFloat(stop.lat), parseFloat(stop.lng));
        if (dist < minDist) { minDist = dist; nearest = stop; }
      });
      if (!nearest) return;

      const coords = [[userLat, userLng], [parseFloat(nearest.lat), parseFloat(nearest.lng)]];
      userLine = L.polyline(coords, {
        color: '#3b82f6',
        weight: 4.5,
        opacity: 0.9,
        dashArray: '10, 15',
        lineJoin: 'round'
      }).addTo(map);

      let offset = 0;
      const animate = () => {
        if (!userLine) return;
        offset = (offset + 1) % 50;
        userLine.setStyle({ dashOffset: offset + 'px' });
        requestAnimationFrame(animate);
      };
      animate();

      map.flyTo([parseFloat(nearest.lat), parseFloat(nearest.lng)], 16, { duration: 1.5 });
    }

    async function getUserLocation() {
      if (!navigator.geolocation) return alert('瀏覽器不支援定位功能');
      navigator.geolocation.getCurrentPosition(pos => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        initMap();
        showUserLocation();
      }, err => {
        let msg = '無法取得位置';
        if (err.code === 1) msg = '您已拒絕定位權限，請在瀏覽器設定中允許';
        alert(msg);
      }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function clearUserLocation() {
      userLat = userLng = null;
      if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
      if (userLine) { map.removeLayer(userLine); userLine = null; }
    }

    function toggleDrawer() {
      const drawer = document.getElementById('drawer');
      const overlay = document.getElementById('drawerOverlay');
      if (drawer.classList.contains('-translate-x-full')) {
        drawer.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
      } else {
        drawer.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
      }
    }

    async function showETA(stopInfo, seq) {
      currentStopId = stopInfo.stop;
      document.getElementById('etaPanel').classList.remove('hidden');
      
      const stopNameEl = document.getElementById('stopName');
      stopNameEl.innerHTML = `
        <span class="text-red-600">${stopInfo.name_tc}</span>
        <span class="text-sm text-gray-500 ml-2">(${stopInfo.name_en})</span>
      `;

      const isFavorite = savedFavorites.some(f => 
        f.route === currentRoute && f.bound === currentBound && f.stopId === stopInfo.stop
      );
      document.getElementById('favoriteStopBtn').innerHTML = isFavorite ? '★' : '☆';

      const nextBusEl = document.getElementById('nextBus');
      const listEl = document.getElementById('etaList');
      listEl.innerHTML = `<p class="text-center py-8 text-gray-400">正在查詢實時到站…</p>`;

      try {
        const res = await fetch(`${BASE}/v1/transport/kmb/stop-eta/${stopInfo.stop}`);
        const json = await res.json();
        let etas = json.data.filter(e => e.route === currentRoute && e.dir === currentBound);

        if (etas.length === 0) {
          listEl.innerHTML = `<p class="text-center py-8 text-gray-400">目前暫無到站資料</p>`;
          nextBusEl.classList.add('hidden');
          return;
        }

        const now = new Date();
        const nextEta = etas[0];
        let minutesLeft = nextEta.eta ? Math.max(0, Math.round((new Date(nextEta.eta) - now) / 60000)) : '—';

        nextBusEl.innerHTML = `<div class="flex items-center justify-center gap-3"><span class="text-3xl">🚌</span><div><span class="text-xl font-medium text-red-600">下一班車還有</span><span class="text-5xl font-bold text-red-600 mx-2">${minutesLeft}</span><span class="text-xl font-medium text-red-600">分鐘</span></div></div>`;
        nextBusEl.classList.remove('hidden');

        let html = '';
        etas.forEach(eta => {
          const timeStr = eta.eta ? new Date(eta.eta).toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' }) : '預定班次';
          const min = eta.eta ? Math.max(0, Math.round((new Date(eta.eta) - now) / 60000)) : '—';
          html += `<div class="flex justify-between items-center border border-gray-200 rounded-3xl p-5"><div><div class="font-semibold text-lg">${eta.dest_tc}</div><div class="text-sm text-gray-500">${eta.rmk_tc || ''}</div></div><div class="text-right"><div class="text-3xl font-bold text-red-600">${timeStr}</div><div class="text-xs text-gray-400">${min} 分鐘</div></div></div>`;
        });
        listEl.innerHTML = html;
      } catch(e) {
        listEl.innerHTML = `<p class="text-red-500 text-center py-6">查詢失敗，請稍後再試</p>`;
        nextBusEl.classList.add('hidden');
      }
    }

    function toggleFavoriteStop() {
      if (!currentRoute || !currentBound || !currentStopId) return;
      const stop = currentStops.find(s => s.stopId === currentStopId);
      if (!stop) return;

      const routeInfo = allRoutes.find(r => r.route === currentRoute && r.bound === currentBound && r.service_type === currentServiceType);
      if (!routeInfo) return;

      const saved = saveFavoriteStop(
        currentRoute, currentBound, currentServiceType,
        stop.stop, stop.name_tc, stop.name_en,
        routeInfo.orig_tc, routeInfo.dest_tc
      );

      if (saved) {
        document.getElementById('favoriteStopBtn').innerHTML = '★';
        alert(`已加入最愛站：${stop.name_tc}`);
      } else {
        removeFavoriteStop(currentRoute, currentBound, stop.stop);
        document.getElementById('favoriteStopBtn').innerHTML = '☆';
      }
    }

    function startFavoritesAutoRefresh() {
      setInterval(() => {
        if (savedFavorites.length > 0) renderFavorites();
      }, 35000);
    }

    window.onload = async () => {
      await loadAllRoutes();
      loadSavedFavorites();
      renderFavorites();
      startFavoritesAutoRefresh();
      console.log('✅ 手機版已完全優化！空白問題已解決，最愛站功能正常');
    };
  </script>
</body>
</html>
