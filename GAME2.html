<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦕 像素恐龍跳躍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, #0a001f, #1a0033);
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
            background: radial-gradient(circle at 50% 50%, rgba(255,136,0,0.15), transparent 70%);
            pointer-events: none; z-index: 0;
        }
        .container {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
            border-radius: 24px; border: 4px solid rgba(255,136,0,0.4);
            padding: 25px 20px 20px; box-shadow: 0 0 80px rgba(255,136,0,0.5);
            max-width: 520px; width: 95%;
        }
        .top-title { text-align: center; margin-bottom: 18px; }
        .top-title h1 {
            font-size: 2.1rem;
            text-shadow: 0 0 20px #ff8800, 0 0 40px #ff8800, 0 0 60px #00ffcc;
            letter-spacing: 4px; color: #fff;
        }
        header { display:flex; align-items:center; margin-bottom:15px; padding:0 8px; }
        .scores { display:flex; gap:20px; margin-left:auto; }
        .score-box {
            background:rgba(0,0,0,0.4); padding:8px 16px; border-radius:12px;
            border:2px solid #ff8800; text-align:center; min-width:80px;
        }
        .label { font-size:0.65rem; opacity:0.8; }
        .value { font-size:1.4rem; color:#ff8800; }
        canvas {
            display:block; margin:0 auto; background:#0a0a1f; border-radius:16px;
            border:6px solid #112233; box-shadow:0 0 40px rgba(255,136,0,0.4);
            image-rendering:pixelated;
        }
        .controls { margin-top:20px; display:flex; justify-content:center; gap:12px; }
        button {
            font-family:'Press Start 2P'; font-size:1rem; cursor:pointer; border:none;
            border-radius:50px; padding:14px 24px; box-shadow:0 8px 0 #880055;
        }
        button:active { transform:translateY(4px); box-shadow:0 4px 0 #880055; }
        .main-btn { background:linear-gradient(#ff00aa,#cc0088); color:white; }

        /* ==================== 側邊選單（已恢復漂亮設計） ==================== */
        .hamburger { background:none; border:none; width:50px; height:50px; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:5px; cursor:pointer; }
        .hamburger span { display:block; width:26px; height:3px; background:#ff8800; border-radius:3px; transition:all 0.3s; box-shadow:0 0 8px #ff8800; }
        .hamburger.active span:nth-child(1){transform:rotate(45deg) translate(6px,6px);}
        .hamburger.active span:nth-child(2){opacity:0;}
        .hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

        .sidebar {
            position:fixed; top:0; left:-290px; width:290px; height:100vh;
            background:rgba(10,0,35,0.98); backdrop-filter:blur(20px);
            border-right:4px solid rgba(255,136,0,0.5);
            box-shadow:10px 0 40px rgba(0,0,0,0.7);
            transition:left 0.45s cubic-bezier(0.32,0.72,0,1);
            z-index:3000; padding-top:90px;
        }
        .sidebar.open { left:0; }
        .sidebar ul { list-style:none; padding:0; margin:0; }
        .sidebar li {
            padding:18px 28px; border-bottom:1px solid rgba(255,136,0,0.2);
            transition:all 0.25s;
        }
        .sidebar li:hover { background:rgba(255,136,0,0.15); padding-left:40px; }
        .sidebar a {
            color:#88ccff; text-decoration:none; font-size:1.05rem;
            display:flex; align-items:center; gap:14px;
            letter-spacing:1px;
        }
        .sidebar a:hover { color:#ff8800; text-shadow:0 0 12px #ff8800; }

        .overlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.65); opacity:0; visibility:hidden;
            transition:all 0.4s; z-index:2999;
        }
        .overlay.show { opacity:1; visibility:visible; }

        .game-over {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            background:rgba(10,0,30,0.95); border:4px solid #ff0066;
            border-radius:20px; padding:30px 40px; text-align:center;
            display:none; z-index:10; box-shadow:0 0 50px #ff0066; width:85%;
        }
    </style>
</head>
<body>
    <!-- 側邊選單 -->
    <div id="sidebar" class="sidebar">
        <ul>
            <li><a href="index.html">🏠 首頁</a></li>
            <li><a href="MTR.html">🚇 港鐵到站查詢</a></li>
            <li><a href="LR.html">🚋 輕鐵到站查詢</a></li>
            <li><a href="BUS.html">🚌 巴士到站查詢</a></li>
            <li><a href="ALLGAMES.html">🎮 小遊戲</a></li>
        </ul>
    </div>
    <div id="overlay" class="overlay"></div>

    <div class="container">
        <div class="top-title"><h1>🦕 像素恐龍跳躍</h1></div>
        <header>
            <button id="hamburger" class="hamburger"><span></span><span></span><span></span></button>
            <div class="scores">
                <div class="score-box"><div class="label">分數</div><div class="value" id="score">00000</div></div>
                <div class="score-box"><div class="label">最高</div><div class="value" id="highscore">00000</div></div>
            </div>
        </header>
        <canvas id="canvas" width="480" height="280"></canvas>
        <div class="controls">
            <button onclick="startGame()" class="main-btn">▶ 開始</button>
            <button onclick="togglePause()" class="main-btn">|| 暫停</button>
        </div>
        <p style="text-align:center; margin-top:15px; opacity:0.75; font-size:0.75rem;">
            按空格 / 點擊 / 向上滑動跳躍<br>躲開仙人掌 • 挑戰最高分！
        </p>
        <div id="gameOver" class="game-over">
            <h2 style="color:#ff0066; margin-bottom:10px; font-size:1.5rem;">GAME OVER</h2>
            <p style="margin-bottom:15px;">你的分數：<span id="finalScore" style="color:#ff8800; font-size:1.6rem;"></span></p>
            <button onclick="restartGame()" style="width:100%; background:linear-gradient(#ff8800,#ff5500); color:#001122; font-size:1.1rem;">再玩一次！</button>
        </div>
    </div>

    <script>
        // （遊戲程式碼與上次完全相同，只更新側邊選單樣式）
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let dino = { x: 50, y: 200, width: 40, height: 40, velocity: 0, isJumping: false };
        let gravity = 0.75;
        let jumpPower = -14;
        let obstacles = [];
        let score = 0;
        let highScore = localStorage.getItem('dinoHigh') || 0;
        let gameSpeed = 5;
        let frame = 0;
        let gameRunning = false;
        let paused = false;
        let gameOverFlag = false;
        let obstacleTimer = 0;
        const GROUND_Y = 240;

        let audioCtx = null;
        function playJumpSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(320, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(680, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.7, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        document.getElementById('highscore').textContent = String(highScore).padStart(5, '0');

        function randomObstacle() {
            const types = ['cactus', 'cactus2', 'bird'];
            const type = types[Math.floor(Math.random() * types.length)];
            return {
                x: canvas.width + 30,
                y: type === 'bird' ? 105 + Math.random() * 55 : GROUND_Y - 35,
                width: type === 'bird' ? 38 : 24,
                height: type === 'bird' ? 28 : 38,
                type: type
            };
        }

        function drawGround() {
            ctx.fillStyle = '#222233';
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
            ctx.strokeStyle = '#ff8800';
            ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(canvas.width, GROUND_Y); ctx.stroke();
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i + (frame % 20), GROUND_Y + 10);
                ctx.lineTo(i + 25 + (frame % 20), GROUND_Y + 10);
                ctx.stroke();
            }
        }

        function drawDino() {
            const x = dino.x, y = dino.y;
            ctx.fillStyle = '#ff8800';
            ctx.fillRect(x+8, y+8, 24, 22);
            ctx.fillRect(x+28, y+4, 14, 16);
            ctx.fillStyle = '#001122';
            ctx.fillRect(x+34, y+8, 4, 4);
            ctx.fillStyle = '#ff8800';
            ctx.fillRect(x+12, y+28, 6, 12);
            ctx.fillRect(x+24, y+28, 6, 12);
            if (!dino.isJumping && Math.floor(frame/6)%2 === 0) ctx.fillRect(x+24, y+34, 6, 6);
            ctx.fillRect(x+2, y+16, 10, 8);
        }

        function drawObstacle(obs) {
            ctx.fillStyle = obs.type === 'bird' ? '#ff0088' : '#00cc66';
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            if (obs.type === 'bird') ctx.fillRect(obs.x+8, obs.y-8, 14, 10);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0,0,0,GROUND_Y);
            grad.addColorStop(0,'#1a0033'); grad.addColorStop(1,'#0a001f');
            ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,GROUND_Y);
            drawGround();
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            let x1 = 80 - (frame * 0.7 % 620); ctx.fillRect(x1, 45, 65, 18);
            let x2 = 220 - (frame * 0.6 % 580); ctx.fillRect(x2, 55, 45, 15);
            let x3 = 380 - (frame * 0.85 % 650); ctx.fillRect(x3, 38, 58, 20);
            drawDino();
            obstacles.forEach(obs => drawObstacle(obs));
            ctx.fillStyle = '#ff8800';
            ctx.font = '20px Press Start 2P';
            ctx.textAlign = 'right';
            ctx.fillText(String(Math.floor(score)).padStart(5,'0'), canvas.width-20, 38);
        }

        function update() {
            if (!gameRunning || paused || gameOverFlag) return;
            frame++; score += 0.2;
            document.getElementById('score').textContent = String(Math.floor(score)).padStart(5,'0');
            if (score > 400 && gameSpeed < 9) gameSpeed = 5 + Math.floor(score/300);
            
            dino.velocity += gravity;
            dino.y += dino.velocity;
            if (dino.y >= GROUND_Y - dino.height) {
                dino.y = GROUND_Y - dino.height;
                dino.velocity = 0;
                dino.isJumping = false;
            }
            
            obstacleTimer++;
            if (obstacleTimer > 38 + Math.random() * 57) {
                if (Math.random() < 0.82) obstacles.push(randomObstacle());
                obstacleTimer = 0;
            }
            
            for (let i = obstacles.length-1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= gameSpeed;
                if (dino.x + dino.width > obs.x && dino.x < obs.x + obs.width &&
                    dino.y + dino.height > obs.y && dino.y < obs.y + obs.height) {
                    endGame();
                    return;
                }
                if (obs.x + obs.width < 0) obstacles.splice(i, 1);
            }
            draw();
        }

        function gameLoop() { update(); if (gameRunning) requestAnimationFrame(gameLoop); }
        
        function jump() {
            if (!dino.isJumping && gameRunning && !paused && !gameOverFlag) {
                dino.velocity = jumpPower;
                dino.isJumping = true;
                playJumpSound();
            }
        }

        function startGame() {
            if (gameRunning) return;
            obstacles = []; score = 0; gameSpeed = 5; frame = 0; obstacleTimer = 0;
            dino.y = GROUND_Y - dino.height; dino.velocity = 0; dino.isJumping = false;
            gameRunning = true; paused = false; gameOverFlag = false;
            document.getElementById('score').textContent = '00000';
            document.getElementById('gameOver').style.display = 'none';
            draw(); gameLoop();
        }

        function endGame() {
            gameRunning = false; gameOverFlag = true;
            if (score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('dinoHigh', highScore);
                document.getElementById('highscore').textContent = String(highScore).padStart(5,'0');
            }
            document.getElementById('finalScore').textContent = String(Math.floor(score)).padStart(5,'0');
            document.getElementById('gameOver').style.display = 'block';
        }

        function togglePause() { if (gameRunning && !gameOverFlag) paused = !paused; }
        function restartGame() { document.getElementById('gameOver').style.display = 'none'; startGame(); }

        document.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); jump(); } });
        canvas.addEventListener('touchstart', () => { if (gameRunning && !paused && !gameOverFlag) jump(); });

        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggleSidebar() {
            const isOpen = sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
            hamburger.classList.toggle('active');
        }
        hamburger.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        window.onload = () => {
            draw();
            console.log('%c✅ 側邊選單已恢復漂亮設計！', 'color:#ff8800; font-size:16px; font-weight:bold');
        };
    </script>
</body>
</html>
